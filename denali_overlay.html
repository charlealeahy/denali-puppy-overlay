<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Denali Puppy Cam Overlay Transparent v7</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>

  :root {
    --w: 1920;
    --h: 1080;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    color: #fff;
  }
  body { background: #000; }
  #stream-video {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 1080px;
    object-fit: cover;
    z-index: -1;
  }
  #wrap {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    overflow: hidden;
  }
  .preview-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  .shade {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,.10), rgba(0,0,0,0) 18%, rgba(0,0,0,0) 72%, rgba(0,0,0,.14));
    z-index: 1;
    pointer-events: none;
  }
  .overlay { position:absolute; inset:0; z-index:2; pointer-events:none; }

  .pup-card {
    position: absolute;
    top: 22px;
    left: 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px 12px 12px;
    min-width: 250px;
    background: rgba(10, 12, 14, 0.52);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.30);
    backdrop-filter: blur(2px);
  }
  .pup-photo {
    width: 74px;
    height: 74px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center;
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.35);
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  .pup-info {
    display:flex;
    flex-direction:column;
    justify-content:center;
    line-height:1.04;
    text-shadow: 0 2px 6px rgba(0,0,0,.55);
    padding-top: 2px;
  }
  .pup-name-row {
    display:flex;
    align-items:center;
    gap:7px;
    font-size:26px;
    font-weight:800;
    letter-spacing:-.3px;
  }
  .gender-f { color:#ff6b98; font-size:28px; font-weight:800; line-height:1; }
  .gender-m { color:#58b8ff; font-size:28px; font-weight:800; line-height:1; }
  .pup-age {
    margin-top:6px;
    display:flex;
    align-items:baseline;
    gap:7px;
  }
  .pup-age .days-number { color:#ff9d1e; font-size:26px; font-weight:900; line-height:1; }
  .pup-age .days-text { color:#fff; font-size:16px; font-weight:700; opacity: .96; }

  .live-badge {
    display:flex;
    align-items:center;
    gap:10px;
    white-space:nowrap;
    font-size:24px;
    font-weight:800;
    letter-spacing:.1px;
  }
  .live-dot {
    width:14px;
    height:14px;
    border-radius:50%;
    background:#ff3b30;
    animation: blinkDot 1.2s infinite ease-in-out;
    box-shadow: 0 0 8px rgba(255,59,48,.45);
  }
  @keyframes blinkDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .3; transform: scale(.85); }
  }

  .bottom-strip {
    position:absolute;
    top:24px;
    right:22px;
    left:auto;
    width:fit-content;
    max-width:1320px;
    height:60px;
    display:inline-flex;
    align-items:center;
    justify-content:flex-start;
    gap:18px;
    background:rgba(14,14,14,.60);
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:0 24px;
    font-size:22px;
    box-shadow:0 4px 14px rgba(0,0,0,.26);
    text-shadow:0 1px 4px rgba(0,0,0,.35);
    backdrop-filter: blur(2px);
  }
  .bottom-left {
    display:flex;
    align-items:center;
    gap:7px;
    min-width:0;
    flex:0 0 auto;
    white-space: nowrap;
  }
  .countdown-label { color:rgba(255,255,255,.97); font-weight:700; }
  .countdown-time { color:#ff3b30; font-weight:900; letter-spacing:.3px; }
  .divider { width:1px; height:28px; background:rgba(255,255,255,.18); flex-shrink:0; }
  .location { white-space:nowrap; color:rgba(255,255,255,.96); font-weight:700; font-size:22px; }
  .bottom-right { display:flex; align-items:center; gap:16px; flex-shrink:0; }

</style>

  ];

  const birthDate = new Date("2026-03-30T00:00:00");
  let pupIndex = 0;

  function fitCanvas() {
    const wrap = document.getElementById('wrap');
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    wrap.style.transform = `scale(${scale})`;
    wrap.style.left = `${Math.max(0, (window.innerWidth - 1920 * scale) / 2)}px`;
    wrap.style.top = `${Math.max(0, (window.innerHeight - 1080 * scale) / 2)}px`;
  }

  function getAnchorageDateParts() {
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "America/Anchorage",
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).formatToParts(new Date());

    const get = type => Number(parts.find(p => p.type === type).value);
    return { year: get("year"), month: get("month"), day: get("day") };
  }

  function getDaysOld() {
    const nowAK = getAnchorageDateParts();
    const todayUTC = Date.UTC(nowAK.year, nowAK.month - 1, nowAK.day);
    const birthUTC = Date.UTC(2026, 2, 30);
    return Math.floor((todayUTC - birthUTC) / (1000 * 60 * 60 * 24));
  }

  function renderPup() {
    const pup = pups[pupIndex];
    document.getElementById("pupPhoto").src = pup.img;
    document.getElementById("pupName").textContent = pup.name;
    const genderEl = document.getElementById("pupGender");
    genderEl.textContent = pup.gender;
    genderEl.className = pup.genderClass;
    document.getElementById("pupDaysNumber").textContent = getDaysOld();
  }

  function nextPup() {
    pupIndex = (pupIndex + 1) % pups.length;
    renderPup();
  }

  function getAnchorageNow() {
    return new Date(new Date().toLocaleString("en-US", { timeZone: "America/Anchorage" }));
  }

  function getNextFeedingTime() {
    const nowAK = getAnchorageNow();
    const schedule = [{ h: 8, m: 30 }, { h: 11, m: 45 }, { h: 16, m: 30 }];
    for (const slot of schedule) {
      const target = new Date(nowAK);
      target.setHours(slot.h, slot.m, 0, 0);
      if (target > nowAK) return target;
    }
    const tomorrow = new Date(nowAK);
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(schedule[0].h, schedule[0].m, 0, 0);
    return tomorrow;
  }

  function updateCountdown() {
    const nowAK = getAnchorageNow();
    const next = getNextFeedingTime();
    let diff = Math.max(0, Math.floor((next - nowAK) / 1000));
    const h = String(Math.floor(diff / 3600)).padStart(2, "0");
    diff %= 3600;
    const m = String(Math.floor(diff / 60)).padStart(2, "0");
    const s = String(diff % 60).padStart(2, "0");
    document.getElementById("countdown").textContent = `${h}:${m}:${s}`;
  }

  renderPup();
  updateCountdown();
  fitCanvas();
  window.addEventListener('resize', fitCanvas);
  setInterval(nextPup, 7000);
  setInterval(updateCountdown, 1000);

</script>
